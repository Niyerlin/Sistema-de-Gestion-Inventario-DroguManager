<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Facturación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">🧾 Panel de Facturación (Vanilla JS)</h1>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="w-full sm:w-1/3">
                <label class="block text-sm font-medium text-gray-700 mb-1">ID del Pedido</label>
                <input
                    type="number"
                    id="pedidoIdInput"
                    placeholder="Ej. 123"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
            </div>
            
            <div class="flex gap-3 w-full sm:w-auto pt-5">
                <button id="btnBuscar" class="flex-1 sm:flex-none bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded-md transition">
                    Buscar Factura
                </button>
                <button id="btnGenerar" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition shadow-sm">
                    ⚙️ Generar Factura
                </button>
            </div>
        </div>

        <div id="errorContainer" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded mb-6">
            <p class="font-bold">Hubo un problema</p>
            <p id="errorMessage"></p>
        </div>

        <div id="facturaContainer" class="hidden bg-white p-8 rounded-lg shadow-xl border border-gray-200 relative overflow-hidden">
            <div class="absolute top-4 right-4">
                <span id="facturaEstado" class="px-3 py-1 rounded-full text-xs font-bold"></span>
            </div>

            <div class="border-b pb-4 mb-6">
                <h2 class="text-xl font-bold text-gray-700">FACTURA N° <span id="facturaId"></span></h2>
                <p class="text-sm text-gray-500">Pedido ID: #<span id="facturaPedidoId"></span></p>
                <p class="text-sm text-gray-500">Cliente ID: #<span id="facturaClienteId"></span></p>
                <p class="text-sm text-gray-500">Fecha Emisión: <span id="facturaFecha"></span></p>
            </div>

            <div class="mb-6">
                <h3 class="font-semibold text-gray-700 mb-2">Detalle de Productos</h3>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-xs uppercase text-gray-600">
                            <th class="p-2">Producto</th>
                            <th class="p-2 text-center">Cant.</th>
                            <th class="p-2 text-right">Precio Unit.</th>
                            <th class="p-2 text-right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="tablaItemsBody" class="text-sm text-gray-700">
                        </tbody>
                </table>
            </div>

          <div class="flex flex-col items-end border-t pt-4">
                <div class="text-sm text-gray-500">Total a Pagar</div>
                <div class="text-3xl font-black text-blue-600">$<span id="facturaTotal"></span></div>
          </div>

          <div class="mt-8 bg-gray-50 p-3 rounded text-xs text-gray-500 border border-dashed">
                <strong>📁 Ubicación del Respaldo (.txt):</strong> <span id="facturaRuta"></span>
          </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
